
#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    server {
        # 외부에서 https로 접속할 때는 443 포트를 사용합니다.
        listen 443 ssl;
        server_name localhost; # 혹은 해당 PC의 IP

        # 인증서 경로 설정 (파일이 위치한 전체 경로를 쓰세요)
        ssl_certificate     C:/projects/analyzer/analyzer.crt;
        ssl_certificate_key C:/projects/analyzer/analyzer.key;

        # SSL 설정 (보안 강화)
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            # 외부(443)에서 들어온 요청을 내부 분석기(8010)로 전달
            proxy_pass http://127.0.0.1:8010;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }   


